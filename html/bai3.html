<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chọn tour yêu thích</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            color: #000;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
        }

        /* Container chứa 3 khối tour */
        .tour-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Định dạng từng khối tour */
        .tour-card {
            border: 1px solid #ccc;
            padding: 20px;
            flex: 1; /* Chia đều chiều rộng cho 3 khối */
            background-color: white;
            transition: background-color 0.3s ease;
        }

        .tour-card h2 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 15px;
        }

        .tour-card p {
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        button {
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #999;
            background-color: #f5f5f5;
        }

        /* Vùng thông báo */
        #thongBao {
            color: blue;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Chọn tour yêu thích</h1>

    <div class="tour-container">
        <!-- Khối tour 1 -->
        <div class="tour-card" id="card-dalat">
            <h2>Tour Đà Lạt</h2>
            <p>Thành phố ngàn hoa, khí hậu mát mẻ.</p>
            <button onclick="chonTour('Tour Đà Lạt', 'card-dalat')">Chọn tour</button>
        </div>

        <!-- Khối tour 2 -->
        <div class="tour-card" id="card-phuquoc">
            <h2>Tour Phú Quốc</h2>
            <p>Nghỉ dưỡng biển đảo, phù hợp cho gia đình.</p>
            <button onclick="chonTour('Tour Phú Quốc', 'card-phuquoc')">Chọn tour</button>
        </div>

        <!-- Khối tour 3 -->
        <div class="tour-card" id="card-hanoi">
            <h2>Tour Hà Nội</h2>
            <p>Tham quan thủ đô, phố cổ và các di tích lịch sử.</p>
            <button onclick="chonTour('Tour Hà Nội', 'card-hanoi')">Chọn tour</button>
        </div>
    </div>

    <!-- Vùng thông báo mặc định ban đầu -->
    <p id="thongBao">Bạn chưa chọn tour nào.</p>

    <!-- Nhúng file JavaScript -->
    <script src="bai3.js"></script>

</body>
</html>
